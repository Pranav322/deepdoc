name = "deepdoc-hosted"
main = "src/index.ts"
compatibility_date = "2026-07-01"

routes = [
  { pattern = "cloud.deepdoc.tech", custom_domain = true }
]

[dev]
port = 3000

# RUNNER_URL/RUNNER_SHARED_SECRET/GITHUB_CLIENT_ID/GITHUB_SECRET_ID are set as
# `wrangler secret put` for production, and as .dev.vars locally (not [vars]
# here) — a plaintext var and a secret can't share the same binding name.

[[d1_databases]]
binding = "DB"
database_name = "deepdoc-hosted-db"
database_id = "ba724999-e3e3-4eb3-bfed-9d85f49dd01e"

[[r2_buckets]]
binding = "SITES"
bucket_name = "deepdoc-hosted-sites"
