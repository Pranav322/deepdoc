# NOT USED.
#
# The droplet already runs Caddy on 80/443 (api.pranavbuilds.tech + watch.contextly.live).
# Installing nginx would conflict on those ports — don't do it.
#
# deepdoc-server runs on port 3001 and is called DIRECTLY by the Cloudflare Pages
# Function using the raw IP. No reverse proxy needed on the droplet.
#
# Cloudflare Pages → Settings → Environment Variables:
#   BACKEND_URL = http://143.110.247.23:3001
#
# If you later want a domain (e.g. api.deepdoc.tech → droplet),
# add this block to /etc/caddy/Caddyfile on the droplet:
#
#   api.deepdoc.tech {
#       reverse_proxy 127.0.0.1:3001
#   }
#
# Then: systemctl reload caddy
