name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  plan-release:
    name: Plan release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read package version
        id: version
        run: |
          python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text())
          version = data["project"]["version"]
          tag = f"v{version}"

          github_output = Path(__import__("os").environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as fh:
              fh.write(f"version={version}\n")
              fh.write(f"tag={tag}\n")
          PY

      - name: Check whether tag already exists
        id: check
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} already exists. Skipping release."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} does not exist yet. Releasing."
          fi

  build:
    name: Build distributions
    runs-on: ubuntu-latest
    needs: plan-release
    if: needs.plan-release.outputs.should_release == 'true'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build package
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/*

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      - plan-release
      - build
    if: needs.plan-release.outputs.should_release == 'true'
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - plan-release
      - publish-pypi
    if: needs.plan-release.outputs.should_release == 'true'
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist

      - name: Extract release notes from CHANGELOG.md
        id: notes
        env:
          RELEASE_VERSION: ${{ needs.plan-release.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["RELEASE_VERSION"]
          changelog_path = Path("CHANGELOG.md")
          output_path = Path(os.environ["RUNNER_TEMP"]) / "release-notes.md"
          github_output = Path(os.environ["GITHUB_OUTPUT"])

          if not changelog_path.exists():
              with github_output.open("a", encoding="utf-8") as fh:
                  fh.write("has_notes=false\n")
              raise SystemExit(0)

          heading_pattern = re.compile(
              rf"^##\s+(?:\[{re.escape(version)}\]|{re.escape(version)}|v{re.escape(version)}|\[v{re.escape(version)}\])(?:\s+-\s+.+)?\s*$"
          )
          next_heading_pattern = re.compile(r"^##\s+")

          lines = changelog_path.read_text(encoding="utf-8").splitlines()
          start_index = None
          end_index = len(lines)

          for index, line in enumerate(lines):
              if heading_pattern.match(line.strip()):
                  start_index = index + 1
                  break

          if start_index is None:
              with github_output.open("a", encoding="utf-8") as fh:
                  fh.write("has_notes=false\n")
              raise SystemExit(0)

          for index in range(start_index, len(lines)):
              if next_heading_pattern.match(lines[index].strip()):
                  end_index = index
                  break

          body_lines = lines[start_index:end_index]
          while body_lines and not body_lines[0].strip():
              body_lines.pop(0)
          while body_lines and not body_lines[-1].strip():
              body_lines.pop()

          if not body_lines:
              with github_output.open("a", encoding="utf-8") as fh:
                  fh.write("has_notes=false\n")
              raise SystemExit(0)

          output_path.write_text("\n".join(body_lines) + "\n", encoding="utf-8")

          with github_output.open("a", encoding="utf-8") as fh:
              fh.write("has_notes=true\n")
              fh.write(f"notes_file={output_path}\n")
          PY

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.plan-release.outputs.tag }}" "${{ github.sha }}"
          git push origin "${{ needs.plan-release.outputs.tag }}"

      - name: Create GitHub release from CHANGELOG.md
        if: steps.notes.outputs.has_notes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.plan-release.outputs.tag }}" dist/* \
            --target "${{ github.sha }}" \
            --title "${{ needs.plan-release.outputs.tag }}" \
            --notes-file "${{ steps.notes.outputs.notes_file }}"

      - name: Create GitHub release with generated notes
        if: steps.notes.outputs.has_notes != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.plan-release.outputs.tag }}" dist/* \
            --target "${{ github.sha }}" \
            --title "${{ needs.plan-release.outputs.tag }}" \
            --generate-notes
