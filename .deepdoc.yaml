project_name: codewiki
description: ''
output_dir: docs
site_dir: site
max_pages: 0
generation_mode: feature_buckets
large_file_lines: 500
giant_file_lines: 2000
source_context_budget: 200000
decompose_threshold: 5
integration_detection: auto
include_feature_pages: true
include_endpoint_pages: true
include_integration_pages: true
llm:
  provider: azure
  model: azure/gpt-4.1
  api_key_env: AZURE_OPENAI_API_KEY
  base_url: https://aiservices-orizn.openai.azure.com/
  max_tokens: null
  temperature: 0.2
languages:
- python
- javascript
- typescript
- go
- php
- vue
include: []
exclude:
- .git
- .svn
- .hg
- .idea
- .vscode
- '*.swp'
- '*.swo'
- .DS_Store
- Thumbs.db
- __pycache__
- '*.pyc'
- '*.pyo'
- '*.pyd'
- .venv
- venv
- '*venv*'
- .mypy_cache
- .pytest_cache
- .ruff_cache
- .tox
- '*.egg-info'
- .eggs
- htmlcov
- node_modules
- '*.min.js'
- '*.bundle.js'
- '*.map'
- .nyc_output
- .eslintcache
- .cache
- .parcel-cache
- .turbo
- storybook-static
- .nuxt
- .output
- .next
- '*.sum'
- '*.exe'
- '*.test'
- '*.out'
- vendor
- .phpunit.cache
- .php-cs-fixer.cache
- storage/framework
- bootstrap/cache
- static
- staticfiles
- media
- dist
- build
- bin
- out
- target
- coverage
- tmp
- .env
- .env.*
- '*.local'
- logs
- '*.log'
- '*.sql'
- '*.lock'
- .docker
- .terraform
- backend-tss-api_v2/backend-tss-api_v2-docs/
github_pages:
  enabled: false
  branch: gh-pages
  remote: origin
site:
  repo_url: ''
  favicon: ''
  logo: ''
  colors:
    primary: ''
    light: ''
    dark: ''
chatbot:
  enabled: true
  index_dir: .deepdoc/chatbot
  backend:
    base_url: ''
    allowed_origins:
    - http://localhost:3000
    - http://127.0.0.1:3000
  answer:
    provider: azure
    model: azure/gpt-4.1
    api_key_env: AZURE_OPENAI_API_KEY
    base_url: https://aiservices-orizn.openai.azure.com/
    api_version: 2024-02-15-preview
    temperature: 0.1
    max_tokens: 1200
  embeddings:
    provider: azure
    model: azure/text-embedding-3-small
    api_key_env: AZURE_EMBEDDING_API_KEY
    base_url: https://prod-chatbot-1.cognitiveservices.azure.com/
    api_version: 2024-12-01-preview
    batch_size: 1
  vector_store:
    kind: faiss
  retrieval:
    top_k_code: 8
    top_k_artifact: 4
    top_k_docs: 3
    max_prompt_code_chunks: 6
    max_prompt_artifact_chunks: 3
    max_prompt_doc_chunks: 2
    max_prompt_chars: 200000
    query_expansion: true
    expansion_max_queries: 3
    rerank: true
    rerank_candidate_limit: 20
  chunking:
    code_chunk_lines: 120
    code_chunk_overlap: 20
    artifact_chunk_lines: 140
    artifact_chunk_overlap: 20
    max_doc_summary_chunks_per_page: 2
    max_doc_summary_chars: 1800
